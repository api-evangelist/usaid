aid: usaid
name: USAID
description: >-
  The U.S. Agency for International Development (USAID) provides programmatic
  access to foreign assistance data, development finance records, project
  tracking, aid flow analysis, and global development datasets through a suite
  of REST APIs. Key offerings include the ForeignAssistance.gov Data API (OAS
  3.0) for budgetary and financial foreign aid data across U.S. government
  agencies, the Development Data Library (DDL) powered by the Socrata Open Data
  API (SODA) for querying and filtering open datasets, and the Development
  Experience Clearinghouse (DEC) API for programmatic access to USAID-funded
  international development documentation. These APIs support researchers,
  policymakers, journalists, and developers building tools around international
  aid transparency and global development outcomes.
