  - Global Datasets
  - Government
apis:
  - name: ForeignAssistance.gov Data API
    description: >-
      The ForeignAssistance.gov Data API (OAS 3.0) is the U.S. government's
      flagship source for foreign assistance budgetary and financial data. It
      exposes spending, obligations, and disbursements across all U.S. government
      agencies managing foreign assistance portfolios, enabling filtering,
      querying, and aggregation of aid flow data by country, sector, year, and
      agency.
    image: >-
      https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://foreignassistance.gov/api-docs
    baseURL: https://foreignassistance.gov/api
    tags:
      - Foreign Assistance
      - Aid Flows
      - Spending Data
      - Budget
    properties:
      - type: Documentation
        url: https://foreignassistance.gov/api-docs
      - type: OpenAPI
        url: https://foreignassistance.gov/api-docs
    contact:
      - FN: ForeignAssistance.gov
        url: https://foreignassistance.gov/data
  - name: USAID Development Data Library API
    description: >-
      The USAID Development Data Library (DDL) provides programmatic access to
      USAID's open datasets via the Socrata Open Data API (SODA). Developers can
      filter, query, and aggregate datasets covering development activities,
      projects, evaluations, and geographic data. An application token is
      required for higher rate limits. Data is also available in machine-readable
      format and feeds into data.gov.
    image: >-
      https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://data.usaid.gov
    baseURL: https://data.usaid.gov/resource
    tags:
      - Open Data
      - Development Datasets
      - SODA
      - Socrata
    properties:
      - type: Documentation
        url: https://dev.socrata.com/consumers/getting-started.html
      - type: X-SODA-API
        url: https://dev.socrata.com/docs/endpoints.html
    contact:
      - FN: USAID Data Services
        url: https://data.usaid.gov
        email: data@usaid.gov
  - name: USAID Development Experience Clearinghouse API
    description: >-
      The USAID Development Experience Clearinghouse (DEC) API provides
      programmatic access to the largest online repository of USAID-funded
      international development documentation, including technical reports,
      evaluations, assessments, and project documents spanning decades of
      development assistance programming worldwide.
    image: >-
      https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://dec.usaid.gov/api/
    baseURL: https://dec.usaid.gov/api
    tags:
      - Development Documents
      - Reports
      - Evaluations
      - Knowledge Management
    properties:
      - type: Documentation
        url: https://dec.usaid.gov/api/help.html
    contact:
      - FN: USAID DEC Support
        url: https://dec.usaid.gov
